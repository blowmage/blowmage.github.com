---
layout: home
title: Home
---

<div class="section-label">recent</div>

<ul class="post-list">
{% for post in site.posts limit:8 %}
  <li class="post-item">
    <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
    <span class="post-arrow">&rarr;</span>
    <div>
      <a href="{{ post.url }}" class="post-title-link">{{ post.title }}</a>
      {% if post.desc %}<div class="post-desc">{{ post.desc }}</div>{% endif %}
    </div>
  </li>
{% endfor %}
</ul>

<a href="/archives" class="archives-link">ls -la archives/ &rarr;</a>
